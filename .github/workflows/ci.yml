name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt the runner-side Node into 24 for actions; suppresses Node 20 deprecation warning.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bash scripts/check-tests.sh

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Runs on every PR — the gate is cheap and the rules drift fast. Locally
    # the same script runs via `pnpm docs:check`. Pre-build it once so the
    # JSON-LD parse check can read built HTML.
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build the docs site
        run: pnpm --filter docs run build
      - name: Run docs:check page-acceptance gate
        run: bash scripts/check-docs.sh

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bash scripts/check-typecheck.sh

  version-sync:
    name: version-sync
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # version-sync's --pr mode is only meaningful in PR context
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bash scripts/check-version-sync.sh

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run Biome (advisory — never blocks merge)
        id: lint
        run: |
          set +e
          bash scripts/check-lint.sh > lint.out 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          cat lint.out
          # Always succeed: lint is advisory at the workflow level
          exit 0
      # Sticky comment — find by hidden HTML marker, update in place if it
      # exists so long-lived PRs don't accumulate one comment per push.
      # When lint goes green, the body becomes "✓ Lint clean" (still sticky)
      # so the stale findings don't linger after they're fixed.
      - name: Sticky lint comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- ethos-ci-lint-comment -->';
            const exitCode = '${{ steps.lint.outputs.exit_code }}';
            let body;
            if (exitCode === '0') {
              body = `${MARKER}\n### ✓ Lint clean (advisory)\n\nNo Biome findings on this PR's snapshot.`;
            } else {
              const raw = fs.readFileSync('lint.out', 'utf8');
              const trimmed = raw.length > 30000 ? raw.slice(0, 30000) + '\n…(truncated)' : raw;
              body = `${MARKER}\n### Lint findings (advisory — does not block merge)\n\`\`\`\n${trimmed}\n\`\`\``;
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
