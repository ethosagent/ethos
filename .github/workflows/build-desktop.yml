name: build-desktop

# Build and publish the Electron desktop app to GitHub Releases.
#
# Usage:
#   1. Ensure the npm release for this version is already published (run the
#      `release` workflow first if needed).
#   2. GitHub → Actions → build-desktop → Run workflow → enter version (e.g. 0.0.1)
#
# The workflow builds on macOS and Windows in parallel. Only if BOTH succeed
# does it create the git tag, publish the GitHub Release, and upload artifacts.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.1)'
        required: true
        type: string

permissions:
  contents: write    # push tag + create/update GitHub Release

concurrency:
  group: build-desktop
  cancel-in-progress: false   # never overlap desktop builds

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact-name: desktop-mac
          - os: windows-2022
            artifact-name: desktop-win
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup

      - name: Set package version
        shell: bash
        run: |
          cd apps/desktop
          npm pkg set version="${{ inputs.version }}"

      - name: Rebuild native modules for Electron
        shell: bash
        working-directory: apps/desktop
        run: pnpm exec electron-rebuild -f -w better-sqlite3

      - name: Build renderer + main
        run: pnpm --filter @ethosagent/desktop build

      - name: Package artifacts
        run: pnpm --filter @ethosagent/desktop package -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release and upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            $(find artifacts -type f | sort)
