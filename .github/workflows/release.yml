name: release

# Manual release. The full sequence is documented in RELEASING.md:
#
#   1. Developer bumps locally:   make version-bump-{patch,minor,major}
#   2. Developer pushes to main:  git commit -m "chore: release vX.Y.Z" && git push origin main
#   3. Developer clicks here:     GitHub → Actions → release → Run workflow
#
# Whatever is on main's VERSION file at the moment this workflow runs is what
# gets published. No bumping happens in CI — that's intentional, the bump is a
# reviewable artifact in git, not a side effect of clicking a button.

on:
  workflow_dispatch:

permissions:
  contents: write    # push the tag + create the GitHub Release
  id-token: write    # reserved for future OIDC trusted-publishing migration

concurrency:
  group: release
  cancel-in-progress: false   # never overlap releases — let the running one finish

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so verify-version.js's git checks (G4, G5) see everything.
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Read the version to release
        run: |
          NEW_VERSION="$(cat VERSION)"
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
          echo "Releasing v${NEW_VERSION}"

      - name: Check if tag already exists — skip if so
        run: |
          if git ls-remote --tags origin "refs/tags/v${NEW_VERSION}" | grep -q .; then
            echo "Tag v${NEW_VERSION} already exists on remote — skipping release."
            echo "SKIP_RELEASE=true" >> "$GITHUB_ENV"
          fi

      - name: Typecheck + lint + tests
        if: env.SKIP_RELEASE != 'true'
        # G7 from the gate model — full check gate before any irreversible step.
        run: pnpm check

      - name: Pre-release gates (G1, G2, G3, G4, G5, G8)
        if: env.SKIP_RELEASE != 'true'
        env:
          CI: true
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/verify-version.js

      - name: Build publishable packages
        if: env.SKIP_RELEASE != 'true'
        run: make build-publishable

      - name: Configure npm auth
        if: env.SKIP_RELEASE != 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      - name: Publish (idempotent lockstep — packages already on npm are skipped)
        if: env.SKIP_RELEASE != 'true'
        run: make release-npm

      - name: Tag and push
        if: env.SKIP_RELEASE != 'true'
        run: |
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release with auto-generated notes
        if: env.SKIP_RELEASE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --generate-notes
