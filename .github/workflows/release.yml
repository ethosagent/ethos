name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: Pre-flight ──────────────────────────────────────────────────
  # Runs all gates: G1-G5 (scripts/verify-version.js), G7 (pnpm check), G8 (NPM_TOKEN).
  # Nothing publishes unless every gate passes.
  preflight:
    name: Pre-flight (G1-G5, G7, G8)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for G4: HEAD vs origin/main comparison

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gates G1, G2, G3, G4, G5, G8
        run: node scripts/verify-version.js
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Gate G7 — typecheck + lint + test
        run: pnpm check

  # ── Stage 2: Publish ─────────────────────────────────────────────────────
  # Builds all five public packages and publishes to npm.
  # Idempotent: packages already at the correct version are skipped.
  publish:
    name: Build + Publish to npm
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all publishable packages
        run: make build-publishable

      - name: Publish to npm
        run: make release-npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Stage 3: Smoke ───────────────────────────────────────────────────────
  # Installs the freshly published package in a clean environment and verifies
  # the reported version matches VERSION. Runs a real LLM round-trip when
  # ANTHROPIC_API_KEY is available.
  smoke:
    name: Smoke test (post-publish)
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Smoke test published package
        run: make smoke-npm
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
