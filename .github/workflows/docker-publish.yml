name: docker-publish

# Build and publish the Docker image to the public Docker Hub repo (ethosagent/ethos).
#
# Usage:
#   1. Ensure the npm release for this version is already published (run the
#      `release` workflow first if needed) — the image installs @ethosagent/cli
#      from npm at the given version.
#   2. GitHub → Actions → docker-publish → Run workflow → enter version (e.g. 0.4.17)
#
# Non-prerelease versions are also tagged `latest`; prereleases (vX.Y.Z-...) are not.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.4.17)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: docker-publish
  cancel-in-progress: false   # never overlap image publishes

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from input
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${INPUT_VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          TAGS="ethosagent/ethos:${VERSION}"
          case "$VERSION" in
            *-*) ;; # prerelease — skip latest
            *)   TAGS="${TAGS},ethosagent/ethos:latest" ;;
          esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@0adf9959216b96bec444f325f1e493d4aa344497 # v6.14.0
        with:
          context: docker/
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CLI_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
