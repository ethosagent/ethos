name: Feature request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        For substantial proposals, consider opening a discussion first or sketching a plan in the style of `plan/phases/`. Implementation can follow once direction is agreed.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: 1-3 sentences. The "why" matters more than the "what".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like ethos to behave? Be specific where you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you'd skip them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, related issues.
