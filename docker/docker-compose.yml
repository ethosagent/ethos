services:
  init:
    image: ethosagent/ethos:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        STATE_DIR="$${ETHOS_STATE_DIR:-/home/ethos/.ethos}"

        # Install plugins from ETHOS_PLUGINS (comma/space-separated pkg@version specs)
        if [ -n "$${ETHOS_PLUGINS}" ]; then
          for pkg_spec in $(echo "$${ETHOS_PLUGINS}" | tr ',' ' '); do
            pkg_ver="$${pkg_spec##*@}"
            pkg_name="$${pkg_spec%@$$pkg_ver}"
            slug="$${pkg_name##*/}"
            dir="$$STATE_DIR/plugins/$$slug"
            _inst=$(node -e "try{process.stdout.write(require('$$dir/node_modules/$$pkg_name/package.json').version)}catch(e){}" 2>/dev/null)
            if [ "$$_inst" != "$$pkg_ver" ]; then
              echo "Installing plugin $$pkg_name@$$pkg_ver..."
              rm -rf "$$dir" && mkdir -p "$$dir"
              printf '%s\n' "{\"name\":\"ethos-plugin-$$slug\",\"version\":\"0.1.0\",\"type\":\"module\",\"main\":\"./index.js\",\"ethos\":{\"type\":\"plugin\",\"pluginContractMajor\":2},\"dependencies\":{\"$$pkg_name\":\"$$pkg_ver\"}}" > "$$dir/package.json"
              printf '%s\n' "export async function activate(api) { const mod = await import('$$pkg_name'); const fn = mod.createTools ?? Object.values(mod).find(v => typeof v === 'function' && v.name.toLowerCase().includes('tool')); if (typeof fn === 'function') for (const t of fn()) api.registerTool(t); }" > "$$dir/index.js"
              (cd "$$dir" && npm install --omit=dev --silent)
              echo "Plugin $$pkg_name@$$pkg_ver installed."
            fi
          done
        fi

        # Config + secrets are provisioned by the CLI, not re-implemented in sh.
        # `ethos setup --from-env` validates the provider key (and Telegram
        # token) before writing, is Storage-abstraction clean, and is the single
        # config writer — replacing the old ~130-line shell re-implementation.
        # Idempotent: config.yaml is written once, secrets re-sync from env every
        # boot. It emits the init last-line contract (✓ on success / an
        # actionable error as the final line before a non-zero exit).
        exec ethos setup --from-env
    env_file:
      - path: ./.env
        required: false
    environment:
      - AZURE_API_KEY
      - AZURE_ENDPOINT
      - AZURE_MODEL
      - AZURE_API_VERSION
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY
      - OPENROUTER_MODEL
      - GOOGLE_API_KEY
      - ETHOS_STATE_DIR
      - ETHOS_PERSONALITY
      - ETHOS_PLUGINS
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_OWNER_ID
    volumes:
      - ${ETHOS_DATA_DIR:-../ethos-data}:${ETHOS_STATE_DIR:-/home/ethos/.ethos}
    restart: "no"

  ethos-web:
    image: ethosagent/ethos:latest
    env_file:
      - path: ./.env
        required: false
    environment:
      ETHOS_WEB_HOST: 0.0.0.0
      ETHOS_MODE: ui
      AZURE_API_KEY:
      AZURE_ENDPOINT:
      AZURE_MODEL:
      AZURE_API_VERSION:
      ANTHROPIC_API_KEY:
      OPENAI_API_KEY:
      OPENROUTER_API_KEY:
      OPENROUTER_MODEL:
      GOOGLE_API_KEY:
      ETHOS_STATE_DIR:
      ETHOS_PERSONALITY:
      TELEGRAM_BOT_TOKEN:
      TELEGRAM_OWNER_ID:
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - ${ETHOS_DATA_DIR:-../ethos-data}:${ETHOS_STATE_DIR:-/home/ethos/.ethos}
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  ethos-gateway:
    image: ethosagent/ethos:latest
    env_file:
      - path: ./.env
        required: false
    environment:
      ETHOS_MODE: gateway
      AZURE_API_KEY:
      AZURE_ENDPOINT:
      AZURE_MODEL:
      AZURE_API_VERSION:
      ANTHROPIC_API_KEY:
      OPENAI_API_KEY:
      OPENROUTER_API_KEY:
      OPENROUTER_MODEL:
      GOOGLE_API_KEY:
      ETHOS_STATE_DIR:
      ETHOS_PERSONALITY:
      TELEGRAM_BOT_TOKEN:
      TELEGRAM_OWNER_ID:
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - ${ETHOS_DATA_DIR:-../ethos-data}:${ETHOS_STATE_DIR:-/home/ethos/.ethos}
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
