<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ethos icon — ring preview</title>
  <style>
    :root {
      font-family: -apple-system, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: #1A1A1A;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      padding: 24px 32px;
      margin: 0;
      border-bottom: 1px solid #E8E8E4;
    }
    .panels {
      display: flex;
      align-items: stretch;
    }
    .panel {
      flex: 1;
      padding: 32px;
    }
    .panel.dark {
      background: #0F0F0F;
      color: #E8E8E6;
      border-right: 1px solid #2A2A2A;
    }
    .panel.light {
      background: #FAFAF7;
      color: #1A1A1A;
    }
    .panel-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 24px;
    }
    .row-label {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.8;
      margin: 24px 0 8px;
    }
    .row {
      display: flex;
      align-items: flex-end;
      gap: 24px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .size-label {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      opacity: 0.6;
    }
    .mark-wrap svg {
      display: block;
    }
  </style>
</head>

      </div>
    </div>

    <div class="panel light">

      <div class="row-label">ethos-icon-dark.svg</div>
      <div class="row">
        <div class="cell"><img src="ethos-icon-dark.svg" width="512" height="512" alt="Ethos dark icon, 512px"><span class="size-label">512</span></div>
        <div class="cell"><img src="ethos-icon-dark.svg" width="128" height="128" alt="Ethos dark icon, 128px"><span class="size-label">128</span></div>

</body>
</html>
