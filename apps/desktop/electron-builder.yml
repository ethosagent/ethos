appId: com.ethos.desktop
productName: Ethos
directories:
  output: dist-electron
files:
  - dist/main/**
  - dist/preload/**
  - dist/renderer/**
  - node_modules/**
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
    - target: zip
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
win:
  icon: build/icon.ico
  target: nsis
  signingHashAlgorithms: [sha256]
linux:
  icon: build/icon.png
  target: AppImage
publish:
  provider: github
  releaseType: release
